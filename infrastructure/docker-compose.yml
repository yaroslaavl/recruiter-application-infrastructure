name: Recruiter-app
services:
  consul-server:
    image: hashicorp/consul
    container_name: consul-server
    environment:
      - CONSUL_BIND_INTERFACE=eth0
      - CONSUL_SERVER_REJOIN_AGE_MAX=0s
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - consul_data:/consul/data
    command: agent -server -data-dir=/consul/data -bootstrap-expect=1 -ui -client 0.0.0.0
    restart: always
    depends_on:
      - redis
    networks:
      - recruiter-net

  redis:
    image: redis:latest
    container_name: redis-server
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always
    networks:
      - recruiter-net

  data-base:
    image: postgres:16.1
    container_name: recruiter-database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: recruiter-app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-keycloak-schema.sql:/docker-entrypoint-initdb.d/01-keycloak.sql
    networks:
      - recruiter-net

  keycloak:
    image: bitnami/keycloak:24.0.5
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_DATABASE_HOST: recruiter-database
      KEYCLOAK_DATABASE_PORT: 5432
      KEYCLOAK_DATABASE_NAME: recruiter-app
      KEYCLOAK_DATABASE_USER: postgres
      KEYCLOAK_DATABASE_PASSWORD: postgres
      KEYCLOAK_DATABASE_SCHEMA: keycloak_schema
      KEYCLOAK_EXTRA_ARGS: --import-realm
    volumes:
      - ./config:/opt/bitnami/keycloak/data/import
    networks:
      - recruiter-net
    depends_on:
      - data-base

  mail_hog:
    container_name: mail_hog_recruiter_app
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - recruiter-net

  minio:
    image: quay.io/minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9091:9091"
    command: server /data --console-address ":9091"
    restart: always
    networks:
      - recruiter-net
    depends_on:
      - data-base

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    entrypoint: >
      bash -c "rabbitmq-plugins enable --silent rabbitmq_stomp && rabbitmq-server"
    networks:
      - recruiter-net
    depends_on:
      - data-base

networks:
  recruiter-net:
    driver: bridge

volumes:
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  consul_data:
    driver: local
  postgres-data: